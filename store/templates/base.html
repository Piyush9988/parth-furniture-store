{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>Parth Furniture</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="/">Parth Furniture</a>

<div class="ms-auto d-flex align-items-center gap-4">

<a class="nav-link text-white" href="/">Home</a>

<a class="nav-link text-white" href="/products/">Products</a>

<a class="nav-link text-white" href="/cart/">
Cart 🛒 ({{ cart_count }})
</a>

<a class="nav-link text-white" href="/checkout/">Checkout</a>

<form class="d-flex ms-3" method="GET" action="/products/">
<input class="form-control me-2" type="search" name="q" placeholder="Search furniture">
<button class="btn btn-outline-light" type="submit">Search</button>
</form>

</div>

</div>
</nav>


<div class="container mt-4">

{% block content %}
{% endblock %}

</div>


<footer class="bg-dark text-center text-white py-3 mt-5">

<p class="mb-0">© 2026 Parth Furniture | All Rights Reserved</p>

<a class="text-white text-decoration-underline" href="/contact/">Contact Us</a>

</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
